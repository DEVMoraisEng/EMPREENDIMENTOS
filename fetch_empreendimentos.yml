name: Atualizar dados Empreendimentos e publicar site

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests openpyxl

      - name: Gerar data_emp.json e FREs preenchidas
        env:
          NOTION_TOKEN_EMP: ${{ secrets.NOTION_TOKEN_EMP }}
          NOTION_DB_EMP:    ${{ secrets.NOTION_DB_EMP }}
        run: python fetch_empreendimentos.py

      - name: Preparar pasta de publicação
        run: |
          mkdir -p dist
          cp index.html         dist/
          cp documentacoes.html dist/
          cp data_emp.json      dist/
          cp FRE_v015.xlsx       dist/ 2>/dev/null || true
          cp logo.png           dist/ 2>/dev/null || true
          # Copia FREs preenchidas (geradas pelo script)
          for f in fre_*.xlsx; do
            [ -f "$f" ] && cp "$f" dist/ && echo "Copiado: $f"
          done

      - name: Commit data_emp.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_emp.json
          if git diff --staged --quiet; then
            echo "Sem alterações"
          else
            git commit -m "chore: atualizar data_emp.json [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
