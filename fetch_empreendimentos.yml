name: Gerar documentos e publicar site — Empreendimentos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'   # a cada 4 horas

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests openpyxl python-docx

      - name: Gerar documentos e data_emp.json
        env:
          NOTION_TOKEN_EMP:      ${{ secrets.NOTION_TOKEN_EMP }}
          NOTION_DB_EMP:         ${{ secrets.NOTION_DB_EMP }}
          NOTION_TOKEN_UH:       ${{ secrets.NOTION_TOKEN_UH }}
          NOTION_DB_UH:          ${{ secrets.NOTION_DB_UH }}
          NOTION_TOKEN_CL:       ${{ secrets.NOTION_TOKEN_CL }}
          NOTION_DB_PRE_ANALISE: ${{ secrets.NOTION_DB_PRE_ANALISE }}
          NOTION_DB_ANALISE_DEF: ${{ secrets.NOTION_DB_ANALISE_DEF }}
          NOTION_DB_CONTRATACAO: ${{ secrets.NOTION_DB_CONTRATACAO }}
        run: python fetch_empreendimentos.py

      - name: Preparar dist/
        run: |
          mkdir -p dist
          cp index.html dist/
          cp documentacoes.html dist/
          cp empreendimento.html dist/
          cp data_emp.json dist/
          cp data_checklists.json dist/ 2>/dev/null || true
          cp logo.png dist/ 2>/dev/null || true

          # Copia arquivos gerados pelo script (nomes com underscore, gerados pelo Python)
          find . -maxdepth 1 \( -name "FRE__*.xlsx" \
                               -o -name "CARTA_PROPOSTA__*.docx" \
                               -o -name "MEMORIAL_HABITACAO__*.docx" \
                               -o -name "MEMORIAL_INFRAESTRUTURA__*.docx" \
                               -o -name "QUADROS_ABNT__*.xlsx" \
                               -o -name "CODIGO_BOAS_PRATICAS__*.docx" \
                               -o -name "DECLARACAO_ABNT__*.docx" \
                               -o -name "PARECER_ESTRUTURAL__*.docx" \) \
               -exec cp {} dist/ \;

          # Copia modelos originais renomeando espaços → underscores (alinha ao HTML)
          cp "FRE_v015.xlsx"                           dist/FRE_v015.xlsx                           2>/dev/null || true
          cp "CARTA PROPOSTA.docx"                     dist/CARTA_PROPOSTA.docx                     2>/dev/null || true
          cp "MEMORIAL DESCRITIVO DE HABITACAO.doc"    dist/MEMORIAL_DESCRITIVO_DE_HABITACAO.doc    2>/dev/null || true
          cp "MEMORIAL DESCRITIVO INFRAESTRUTURA.doc"  dist/MEMORIAL_DESCRITIVO_INFRAESTRUTURA.doc  2>/dev/null || true
          cp "QUADROS ABNT.xlsx"                       dist/QUADROS_ABNT.xlsx                       2>/dev/null || true
          cp "CÓDIGO DE BOAS PRÁTICAS.docx"           dist/CODIGO_DE_BOAS_PRATICAS.docx           2>/dev/null || true
          cp "CODIGO DE BOAS PRATICAS.docx"            dist/CODIGO_DE_BOAS_PRATICAS.docx           2>/dev/null || true
          cp "DECLARAÇÃO DE ATENDIMENTO ABNT.doc"        dist/DECLARACAO_DE_ATENDIMENTO_ABNT.doc     2>/dev/null || true
          cp "DECLARAÇÃO DE ATENDIMENTO ABNT.docx"       dist/DECLARACAO_DE_ATENDIMENTO_ABNT.docx    2>/dev/null || true
          cp "PARECER ESTRUTURAL.docx"                   dist/PARECER_ESTRUTURAL.docx                2>/dev/null || true

          # Copia manuais PDF renomeando espaços → underscores
          cp "MANUAL FRE.pdf"                          dist/MANUAL_FRE.pdf                          2>/dev/null || true
          cp "MANUAL CARTA PROPOSTA.pdf"               dist/MANUAL_CARTA_PROPOSTA.pdf               2>/dev/null || true
          cp "MANUAL MEMORIAL HABITACAO.pdf"           dist/MANUAL_MEMORIAL_HABITACAO.pdf           2>/dev/null || true
          cp "MANUAL MEMORIAL INFRAESTRUTURA.pdf"      dist/MANUAL_MEMORIAL_INFRAESTRUTURA.pdf      2>/dev/null || true

          echo "--- Conteúdo do dist/ ---"
          ls -lh dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
