<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morais Engenharia · Empreendimentos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#295778;--azul-esc:#1e3f58;--teal:#8FDCD2;
  --verde:#2a9d5c;--verde-btn:#4cd964;
  --bg:#EAF1F3;--bg2:#F5F9FA;--bg3:#dceaef;
  --border:#b8d0da;--border2:#d0e4ec;
  --text:#1a3347;--text3:#5a8099;--text4:#8aacbb;--branco:#fff;
}
body{background:var(--bg);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{background:var(--azul);border-bottom:3px solid var(--teal);padding:0 28px;
        height:68px;display:flex;align-items:center;gap:14px;
        position:sticky;top:0;z-index:200}
.hdr-logo{height:38px;flex-shrink:0;object-fit:contain}
.hdr-info{display:flex;flex-direction:column;flex:1}
.hdr-sup{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.12em;
         text-transform:uppercase;opacity:.85}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;
           color:#fff;letter-spacing:.02em}
.updated{font-size:11px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace;white-space:nowrap}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
         justify-content:center;z-index:500;flex-direction:column;gap:12px}
#loading.hidden{display:none}
.spin{width:36px;height:36px;border:3px solid var(--border);
      border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:14px;font-weight:600;color:var(--text3)}

/* CONTEÚDO PRINCIPAL */
.main{padding:32px 28px 48px;max-width:1200px;margin:0 auto}

/* FILTROS */
.filtro-bar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.filtro-lbl{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;
            letter-spacing:.08em}
.filtro-input{background:var(--branco);border:1.5px solid var(--border);border-radius:8px;
              padding:8px 14px;font-family:'Barlow',sans-serif;font-size:13px;
              color:var(--text);outline:none;width:220px;transition:border-color .15s}
.filtro-input:focus{border-color:var(--teal)}
.filtro-select{background:var(--branco);border:1.5px solid var(--border);border-radius:8px;
               padding:8px 14px;font-family:'Barlow',sans-serif;font-size:13px;
               color:var(--text);cursor:pointer;outline:none;transition:border-color .15s}
.filtro-select:focus{border-color:var(--teal)}
.filtro-count{font-size:12px;color:var(--text4);margin-left:auto;font-family:'DM Mono',monospace}

/* GRID DE CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}

/* CARD DE EMPREENDIMENTO */
.card{background:var(--branco);border:1.5px solid var(--border);border-radius:12px;
      box-shadow:0 2px 10px rgba(41,87,120,.07);overflow:hidden;
      cursor:pointer;transition:box-shadow .18s,border-color .18s,transform .15s;
      display:flex;flex-direction:column}
.card:hover{box-shadow:0 6px 20px rgba(41,87,120,.15);border-color:var(--teal);transform:translateY(-2px)}

.card-status-bar{height:5px;background:var(--border)}
.card-status-bar.pendente   {background:#b0bec5}
.card-status-bar.processo   {background:#f4a028}
.card-status-bar.aprovando  {background:#2e86de}
.card-status-bar.aprovada   {background:var(--teal)}
.card-status-bar.obra       {background:#8e44ad}
.card-status-bar.finalizada {background:var(--verde)}

.card-body{padding:18px 20px 14px;flex:1}
.card-nome{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
           color:var(--azul-esc);letter-spacing:.02em;line-height:1.15;margin-bottom:6px}
.card-loc{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;
          letter-spacing:.06em;margin-bottom:12px}
.card-loc span{color:var(--text4)}

/* PROGRESSO DOS STATUS */
.card-prog{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.prog-item{display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;
           text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:10px}
.prog-item.ok  {background:rgba(42,157,92,.12);color:#1a6b40;border:1px solid rgba(42,157,92,.3)}
.prog-item.off {background:rgba(176,190,197,.15);color:#90aab8;border:1px solid rgba(176,190,197,.3)}
.prog-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.prog-item.ok  .dot{background:#2a9d5c}
.prog-item.off .dot{background:#b0bec5}

/* BADGE DE STATUS PRINCIPAL */
.card-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;
            font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.badge-pendente  {background:rgba(176,190,197,.2);color:#607d8b}
.badge-processo  {background:rgba(244,160,40,.12);color:#b5720a}
.badge-aprovando {background:rgba(46,134,222,.12);color:#1a5fa0}
.badge-aprovada  {background:rgba(143,220,210,.2);color:#1a6b61}
.badge-obra      {background:rgba(142,68,173,.12);color:#6c2f96}
.badge-finalizada{background:rgba(42,157,92,.12);color:#1a6b40}

/* BOTÕES DE AÇÃO DO CARD */
.card-btns{border-top:1px solid var(--border2);padding:12px 20px;
           display:flex;gap:8px;background:var(--bg2)}
.card-btn{flex:1;padding:9px 8px;border-radius:7px;border:1.5px solid var(--border);
          font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;
          letter-spacing:.06em;text-transform:uppercase;color:var(--text3);
          background:var(--branco);cursor:pointer;transition:all .15s;text-align:center;
          white-space:nowrap}
.card-btn:hover{border-color:var(--teal);color:var(--azul);background:rgba(143,220,210,.08)}
.card-btn.primary{border-color:var(--azul);color:var(--branco);background:var(--azul)}
.card-btn.primary:hover{background:var(--azul-esc);border-color:var(--azul-esc)}

/* VAZIO */
.vazio{text-align:center;padding:60px 20px;color:var(--text4);
       font-size:15px;grid-column:1/-1}
.vazio strong{display:block;font-family:'Barlow Condensed',sans-serif;
              font-size:22px;color:var(--text3);margin-bottom:6px}

/* MOBILE */
@media(max-width:640px){
  .main{padding:20px 16px 40px}
  .grid{grid-template-columns:1fr}
  .filtro-bar{gap:8px}
  .filtro-input,.filtro-select{width:100%}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="load-txt">Carregando empreendimentos...</div>
</div>

<div class="header">
  <img src="logo.png" alt="Morais" class="hdr-logo" onerror="this.style.display='none'">
  <div class="hdr-info">
    <div class="hdr-sup">Morais Engenharia · Controle</div>
    <div class="hdr-title">Empreendimentos</div>
  </div>
  <div class="updated" id="updated-at"></div>
</div>

<div class="main">
  <div class="filtro-bar">
    <span class="filtro-lbl">Buscar</span>
    <input class="filtro-input" id="filtro-nome" placeholder="Nome do empreendimento..." oninput="filtrar()">
    <select class="filtro-select" id="filtro-cidade" onchange="filtrar()">
      <option value="">Todas as cidades</option>
    </select>
    <select class="filtro-select" id="filtro-status" onchange="filtrar()">
      <option value="">Todos os status</option>
      <option value="pendente">Não iniciado</option>
      <option value="processo">Processo iniciado</option>
      <option value="aprovando">Aprovação iniciada</option>
      <option value="aprovada">Aprovação concluída</option>
      <option value="obra">Obra iniciada</option>
      <option value="finalizada">Obra finalizada</option>
    </select>
    <span class="filtro-count" id="filtro-count"></span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
let DATA = [];

const PROG_ITEMS = [
  {campo:'processo_iniciado',  label:'Processo'},
  {campo:'aprovacao_iniciada', label:'Aprovação'},
  {campo:'aprovacao_concluida',label:'Aprovado'},
  {campo:'obra_iniciada',      label:'Obra'},
  {campo:'obra_finalizada',    label:'Finalizado'},
];

function renderCard(emp) {
  // Barra de progresso dos status
  const prog = PROG_ITEMS.map(p =>
    `<div class="prog-item ${emp[p.campo] ? 'ok' : 'off'}">
      <span class="dot"></span>${p.label}
    </div>`
  ).join('');

  // Localização
  const loc = [emp.setor, emp.cidade].filter(Boolean).join(' · ');

  return `
  <div class="card" data-id="${emp.id}">
    <div class="card-status-bar ${emp.status_cor}"></div>
    <div class="card-body">
      <div class="card-nome">${emp.nome}</div>
      <div class="card-loc">${loc || '<span>Localização não informada</span>'}</div>
      <div class="card-prog">${prog}</div>
      <span class="card-badge badge-${emp.status_cor}">${emp.status_label}</span>
    </div>
    <div class="card-btns">
      <button class="card-btn" onclick="abrirAba('aprovacao','${emp.id}')">Aprovação</button>
      <button class="card-btn" onclick="abrirAba('andamento','${emp.id}')">Andamento</button>
      <button class="card-btn primary" onclick="abrirAba('documentacoes','${emp.id}')">Documentações</button>
    </div>
  </div>`;
}

function filtrar() {
  const busca  = document.getElementById('filtro-nome').value.toLowerCase().trim();
  const cidade = document.getElementById('filtro-cidade').value;
  const status = document.getElementById('filtro-status').value;

  const filtrados = DATA.filter(emp => {
    if (busca  && !emp.nome.toLowerCase().includes(busca))   return false;
    if (cidade && emp.cidade !== cidade)                      return false;
    if (status && emp.status_cor !== status)                  return false;
    return true;
  });

  document.getElementById('grid').innerHTML = filtrados.length
    ? filtrados.map(renderCard).join('')
    : '<div class="vazio"><strong>Nenhum resultado</strong>Ajuste os filtros acima</div>';

  document.getElementById('filtro-count').textContent =
    `${filtrados.length} de ${DATA.length} empreendimento${DATA.length !== 1 ? 's' : ''}`;
}

function abrirAba(aba, id) {
  if (aba === 'documentacoes') {
    window.location.href = `documentacoes.html?id=${encodeURIComponent(id)}`;
  } else {
    // Páginas futuras (aprovação e andamento)
    alert(`A aba "${aba.charAt(0).toUpperCase() + aba.slice(1)}" está em desenvolvimento.\nEstará disponível em breve.`);
  }
}

async function init() {
  try {
    const resp = await fetch(`data_emp.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    DATA = json.empreendimentos || [];

    // Atualiza timestamp
    if (json.updated_at) {
      const d = new Date(json.updated_at);
      document.getElementById('updated-at').textContent =
        'Notion ' + d.toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',
        hour:'2-digit',minute:'2-digit'});
    }

    // Popula filtro de cidades
    const cidades = [...new Set(DATA.map(e => e.cidade).filter(Boolean))].sort();
    const selCidade = document.getElementById('filtro-cidade');
    cidades.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      selCidade.appendChild(opt);
    });

    filtrar();
  } catch(e) {
    console.error(e);
    document.getElementById('grid').innerHTML =
      '<div class="vazio"><strong>Erro ao carregar dados</strong>' +
      'Verifique se o data_emp.json foi gerado corretamente</div>';
  } finally {
    document.getElementById('loading').classList.add('hidden');
  }
}

init();
</script>
</body>
</html>
