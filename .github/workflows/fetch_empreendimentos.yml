name: Gerar documentos e publicar site — Empreendimentos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'   # a cada 4 horas

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests openpyxl python-docx

      - name: Gerar documentos e data_emp.json
        env:
          NOTION_TOKEN_EMP: ${{ secrets.NOTION_TOKEN_EMP }}
          NOTION_DB_EMP:    ${{ secrets.NOTION_DB_EMP }}
          NOTION_TOKEN_UH:  ${{ secrets.NOTION_TOKEN_UH }}
          NOTION_DB_UH:     ${{ secrets.NOTION_DB_UH }}
        run: python fetch_empreendimentos.py

      - name: Preparar dist/
        run: |
          mkdir -p dist
          cp index.html dist/
          cp documentacoes.html dist/
          cp data_emp.json dist/
          cp logo.png dist/ 2>/dev/null || true
          # Copia todos os arquivos gerados (FRE, Carta, Memoriais, Quadros)
          find . -maxdepth 1 \( -name "FRE__*.xlsx" \
                               -o -name "CARTA_PROPOSTA__*.docx" \
                               -o -name "MEMORIAL_HABITACAO__*.docx" \
                               -o -name "MEMORIAL_INFRAESTRUTURA__*.docx" \
                               -o -name "QUADROS_ABNT__*.xlsx" \) \
               -exec cp {} dist/ \;
          # Copia os modelos originais
          cp FRE_v*.xlsx dist/ 2>/dev/null || true
          cp CARTA_PROPOSTA.docx dist/ 2>/dev/null || true
          cp MEMORIAL_DESCRITIVO_DE_HABITACAO.doc dist/ 2>/dev/null || true
          cp MEMORIAL_DESCRITIVO_INFRAESTRUTURA.doc dist/ 2>/dev/null || true
          cp QUADROS_ABNT.xlsx dist/ 2>/dev/null || true
          # Copia manuais PDF (se existirem)
          cp MANUAL_*.pdf dist/ 2>/dev/null || true
          echo "--- Conteúdo do dist/ ---"
          ls -lh dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
